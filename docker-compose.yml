services:
  postgres:
    image: postgres:16-alpine
    container_name: link-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: link
      POSTGRES_PASSWORD: link
      POSTGRES_DB: link_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U link -d link_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
